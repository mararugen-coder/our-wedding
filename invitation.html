<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You are Invited — Celebrating the Giglios</title>
    <!-- Premium Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
    
    <link rel="icon" href="favicon-black.png" type="image/png" media="(prefers-color-scheme: light)">
    <link rel="icon" href="favicon-white.png" type="image/png" media="(prefers-color-scheme: dark)">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #faf9f6; /* Signature warm off-white */
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            height: 220vh; /* Smooth scrolling runway to trigger the card opening */
            position: relative;
        }

        /* ----------------------------------------------------
           ORGANIC WATERCOLOR FLORALS & BACKGROUND WASHES
           ---------------------------------------------------- */
        /* Soft watercolor washes in the background corners */
        .watercolor-wash-sage {
            position: fixed;
            top: -5%;
            left: -5%;
            width: 45%;
            height: 45vh;
            background: radial-gradient(circle, rgba(163, 177, 155, 0.25) 0%, rgba(250, 249, 246, 0) 70%);
            pointer-events: none;
            z-index: 0;
            filter: blur(15px);
        }

        .watercolor-wash-rust {
            position: fixed;
            bottom: -5%;
            right: -5%;
            width: 50%;
            height: 50vh;
            background: radial-gradient(circle, rgba(217, 125, 86, 0.2) 0%, rgba(250, 249, 246, 0) 75%);
            pointer-events: none;
            z-index: 0;
            filter: blur(15px);
        }

        /* Abundant Hand-drawn Florals framing the screen corners */
        .floral-corner {
            position: fixed;
            width: 450px;
            height: 450px;
            pointer-events: none;
            z-index: 1;
            opacity: 0.92;
        }

        .floral-top-left {
            top: -60px;
            left: -60px;
            transform: rotate(-10deg);
        }

        .floral-bottom-right {
            bottom: -60px;
            right: -60px;
            transform: rotate(170deg);
        }

        /* Secondary foliage to fill the background and add depth */
        .floral-background-accent {
            position: fixed;
            width: 320px;
            height: 320px;
            pointer-events: none;
            z-index: 0;
            opacity: 0.6;
        }

        .floral-accent-top-right {
            top: 5%;
            right: -40px;
            transform: rotate(45deg);
        }

        .floral-accent-bottom-left {
            bottom: 5%;
            left: -40px;
            transform: rotate(-135deg);
        }

        /* Fixed viewport scene hosting the envelope */
        .invite-viewport-scene {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1200px;
            z-index: 10;
        }

        /* Scroll Progress Hint Tracker */
        .scroll-hint {
            position: absolute;
            bottom: 40px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #d97d56; /* Rust accent */
            animation: bounceIndicator 2s infinite;
            text-align: center;
            pointer-events: none;
            transition: opacity 0.4s ease;
            font-weight: 400;
        }

        /* ----------------------------------------------------
           THE ENVELOPE (MATTE SLATE BLUE & SHIMMER GOLD)
           ---------------------------------------------------- */
        .envelope-wrapper {
            position: relative;
            width: 460px;
            height: 360px; /* Taller envelope to completely hold the card */
            background-color: #34495e; /* Elegant slate blue base */
            box-shadow: 0 30px 60px rgba(44, 62, 80, 0.2);
            margin-top: 60px;
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* The Left, Right, and Bottom overlapping fold flap pockets */
        .envelope-wrapper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Multi-angle pockets with soft realistic shadows */
            background: linear-gradient(315deg, #2c3e50 50%, transparent 50%),
                        linear-gradient(45deg, #2c3e50 50%, transparent 50%),
                        linear-gradient(to top, #34495e 30%, #3d566e 100%);
            z-index: 3; /* Keeps envelope front pockets stacked completely over the card */
            border-bottom: 2px solid rgba(219, 183, 108, 0.25); /* Subtle gold foil baseline trim */
        }

        /* The Top Open Flap (Slate Blue interior, Gold foil outer peak trim) */
        .envelope-flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 230px solid transparent;
            border-right: 230px solid transparent;
            border-top: 180px solid #34495e; /* Matches base Slate Blue */
            transform-origin: top center;
            z-index: 4; /* Keeps flap stacked above card until flipped open */
            transform: rotateX(0deg);
            will-change: transform;
            filter: drop-shadow(0 6px 10px rgba(0,0,0,0.15));
        }

        /* Gold foil edge line on the inner lip of the opening flap */
        .envelope-flap::after {
            content: '';
            position: absolute;
            top: -182px;
            left: -230px;
            width: 0;
            height: 0;
            border-left: 230px solid transparent;
            border-right: 230px solid transparent;
            border-top: 180px solid rgba(219, 183, 108, 0.4);
            z-index: -1;
            transform: scale(0.982) translateY(-2px);
        }

        /* ----------------------------------------------------
           THE WEDDING INVITATION CARD (GOLD FOIL + FLORAL INNER)
           ---------------------------------------------------- */
        .invitation-card {
            position: absolute;
            top: 25px; /* Safely tucked away inside envelope height */
            left: 20px;
            width: 420px;
            height: 310px; /* Kept strictly under 360px so it is invisible from bottom */
            background-color: #ffffff;
            z-index: 2; /* Sandwiched behind front pockets, in front of back panel */
            transform: translateY(0);
            will-change: transform;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            transition: transform 0.5s ease;
        }

        /* Realistic Multi-Tone Gold Foil Outer Border Trim */
        .gold-foil-border {
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            bottom: 12px;
            pointer-events: none;
            border: 2px solid transparent;
            border-image: linear-gradient(135deg, #bf953f 0%, #fcf6ba 25%, #b38728 50%, #fbf5b7 75%, #aa771c 100%) 1;
        }

        /* Inner Content Frame Container */
        .card-inner-frame {
            width: 100%;
            height: 100%;
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        /* Corner Floral sprigs nested inside the gold foil borders */
        .card-corner-floral {
            position: absolute;
            width: 65px;
            height: 65px;
            pointer-events: none;
        }

        .card-floral-top-left {
            top: 15px;
            left: 15px;
        }

        .card-floral-bottom-right {
            bottom: 15px;
            right: 15px;
            transform: rotate(180deg);
        }

        /* Inner Card Typography */
        .card-caption {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #7d8c77; /* Sage */
            font-weight: 500;
        }

        .card-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.1rem;
            font-weight: 300;
            color: #34495e;
            line-height: 1.25;
            margin: 10px 0;
        }

        .card-date {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            font-style: italic;
            color: #d97d56; /* Rust Orange Accent */
            letter-spacing: 1px;
            font-weight: 400;
        }

        .card-location {
            font-size: 0.75rem;
            letter-spacing: 1.5px;
            color: #555555;
            text-transform: uppercase;
            line-height: 1.5;
            font-weight: 300;
        }

        /* Gold Foil Button link to Homepage */
        .card-cta-link {
            display: inline-block;
            padding: 10px 30px;
            background: linear-gradient(135deg, #bf953f 0%, #d4af37 50%, #aa771c 100%);
            color: #ffffff;
            text-decoration: none;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 500;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(170, 119, 28, 0.25);
            transition: all 0.3s ease;
            border: none;
        }

        .card-cta-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(170, 119, 28, 0.45);
        }

        /* Animation Helpers */
        @keyframes bounceIndicator {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-8px); }
            60% { transform: translateY(-4px); }
        }

        /* ----------------------------------------------------
           RESPONSIVE MOBILE GRAPHIC CONTAINER SCALING
           ---------------------------------------------------- */
        @media (max-width: 500px) {
            .envelope-wrapper {
                width: 320px;
                height: 250px;
                margin-top: 30px;
            }
            .envelope-flap {
                border-left-width: 160px;
                border-right-width: 160px;
                border-top-width: 125px;
            }
            .envelope-flap::after {
                border-left-width: 160px;
                border-right-width: 160px;
                border-top-width: 125px;
                top: -127px;
                left: -160px;
            }
            .invitation-card {
                width: 290px;
                height: 215px;
                left: 15px;
                top: 20px;
            }
            .card-inner-frame { padding: 20px 15px; }
            .card-title { font-size: 1.5rem; }
            .card-date { font-size: 1.15rem; }
            .card-location { font-size: 0.65rem; }
            .card-cta-link { padding: 8px 20px; font-size: 0.7rem; }
            .floral-corner { width: 280px; height: 280px; }
            .floral-background-accent { width: 200px; height: 200px; }
        }
    </style>
</head>
<body>

    <!-- Soft watercolor background elements -->
    <div class="watercolor-wash-sage"></div>
    <div class="watercolor-wash-rust"></div>

    <!-- ----------------------------------------------------

    <!-- Bottom-Right Foliage -->
    <svg class="floral-corner floral-bottom-right" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12,12 C28,35 45,55 52,78" stroke="#7d8c77" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M22,25 C14,15 5,19 7,27 C10,35 18,33 22,25 Z" fill="#a3b19b" opacity="0.9"/>
        <path d="M30,37 C20,28 12,34 15,42 C18,50 26,46 30,37 Z" fill="#a3b19b" opacity="0.9"/>
        <path d="M38,50 C29,43 23,50 25,57 C27,64 35,59 38,50 Z" fill="#a3b19b" opacity="0.9"/>
        <path d="M44,64 C36,59 31,65 33,71 C35,77 42,72 44,64 Z" fill="#92a08a" opacity="0.9"/>

        <path d="M12,12 C18,45 28,70 32,88" stroke="#d97d56" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="1 3"/>
        <path d="M18,48 C11,46 8,56 14,60 C19,63 24,53 18,48 Z" fill="#d97d56" opacity="0.95"/>
        <path d="M25,69 C18,67 16,77 22,81 C27,84 31,74 25,69 Z" fill="#cf7049" opacity="0.95"/>
        
        <path d="M12,12 C35,18 62,28 78,38" stroke="#dfb76c" stroke-width="1.2" stroke-linecap="round"/>
        <circle cx="45" cy="18" r="3.5" fill="#dfb76c" opacity="0.95"/>
        <circle cx="60" cy="23" r="3" fill="#dfb76c" opacity="0.95"/>
        <circle cx="72" cy="31" r="2.5" fill="#dfb76c" opacity="0.95"/>
    </svg>

    <!-- Top-Right Background Accent -->
    <svg class="floral-background-accent floral-accent-top-right" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M10,10 C25,30 40,45 48,65" stroke="#a3b19b" stroke-width="1" stroke-linecap="round"/>
        <path d="M18,20 C10,12 3,15 5,21 C8,27 14,25 18,20 Z" fill="#a3b19b" opacity="0.6"/>
        <path d="M25,30 C18,22 11,25 13,31 C16,37 22,35 25,30 Z" fill="#a3b19b" opacity="0.6"/>
        <path d="M10,10 C30,15 50,22 62,30" stroke="#dfb76c" stroke-width="0.8" stroke-linecap="round"/>
        <circle cx="35" cy="13" r="2" fill="#dfb76c" opacity="0.7"/>
        <circle cx="48" cy="17" r="1.8" fill="#dfb76c" opacity="0.7"/>
    </svg>

    <!-- Bottom-Left Background Accent -->
    <svg class="floral-background-accent floral-accent-bottom-left" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M10,10 C25,30 40,45 48,65" stroke="#a3b19b" stroke-width="1" stroke-linecap="round"/>
        <path d="M18,20 C10,12 3,15 5,21 C8,27 14,25 18,20 Z" fill="#a3b19b" opacity="0.6"/>
        <path d="M25,30 C18,22 11,25 13,31 C16,37 22,35 25,30 Z" fill="#a3b19b" opacity="0.6"/>
        <path d="M10,10 C30,15 50,22 62,30" stroke="#dfb76c" stroke-width="0.8" stroke-linecap="round"/>
        <circle cx="35" cy="13" r="2" fill="#dfb76c" opacity="0.7"/>
        <circle cx="48" cy="17" r="1.8" fill="#dfb76c" opacity="0.7"/>
    </svg>


    <!-- Main 3D Simulation Viewport -->
    <div class="invite-viewport-scene">
        
        <!-- The Envelope Container -->
        <div class="envelope-wrapper" id="envelopeContainer">
            <!-- The Top Lid Flap -->
            <div class="envelope-flap" id="envelopeLid"></div>
            
            <!-- Invitation Card Insert (Tucked securely inside, shorter than envelope) -->
            <div class="invitation-card" id="inviteCard">
                <!-- Outer Metallic Foil Gold Border Frame -->
                <div class="gold-foil-border"></div>

                <div class="card-inner-frame">
                    <!-- Internal Card Corner Accent sprigs (delicate sage + gold) -->
                    <svg class="card-corner-floral card-floral-top-left" viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5,5 Q15,20 25,35" stroke="#7d8c77" stroke-width="1" stroke-linecap="round"/>
                        <path d="M11,13 Q4,4 2,9 Q6,14 11,13" fill="#a3b19b"/>
                        <path d="M17,21 Q10,15 9,20 Q13,25 17,21" fill="#a3b19b"/>
                        <circle cx="25" cy="10" r="2" fill="#dfb76c"/>
                        <path d="M5,5 Q20,10 35,15" stroke="#dfb76c" stroke-width="0.8"/>
                        <circle cx="35" cy="15" r="1.5" fill="#dfb76c"/>
                    </svg>

                    <svg class="card-corner-floral card-floral-bottom-right" viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5,5 Q15,20 25,35" stroke="#7d8c77" stroke-width="1" stroke-linecap="round"/>
                        <path d="M11,13 Q4,4 2,9 Q6,14 11,13" fill="#a3b19b"/>
                        <path d="M17,21 Q10,15 9,20 Q13,25 17,21" fill="#a3b19b"/>
                        <circle cx="25" cy="10" r="2" fill="#dfb76c"/>
                        <path d="M5,5 Q20,10 35,15" stroke="#dfb76c" stroke-width="0.8"/>
                        <circle cx="35" cy="15" r="1.5" fill="#dfb76c"/>
                    </svg>

                    <span class="card-caption">The Wedding Invitation</span>
                    
                    <div>
                        <h1 class="card-title">Celebrating<br>the Giglios</h1>
                        <p class="card-date">07 . 24 . 27</p>
                    </div>
                    
                    <p class="card-location">
                        Flagstaff, Arizona
                    </p>
                    
                    <a href="index.html" class="card-cta-link">Enter Website</a>
                </div>
            </div>
        </div>

        <!-- Scroll Assistance Guidance Callout -->
        <div class="scroll-hint" id="scrollIndicator">
            Scroll Down to Open
        </div>
    </div>

    <!-- ----------------------------------------------------
         THE PARALLAX MECHANICAL VELOCITY LOGIC DRIVER ENGINE
         ---------------------------------------------------- -->
    <script>
        window.addEventListener('scroll', () => {
            const scrollTop = window.scrollY;
            const maxScroll = window.innerHeight; // Animation spans the length of one complete viewport transition scroll height
            
            // Calculate progress percentage
            let percent = Math.min(scrollTop / maxScroll, 1);

            const lid = document.getElementById('envelopeLid');
            const card = document.getElementById('inviteCard');
            const envelope = document.getElementById('envelopeContainer');
            const hint = document.getElementById('scrollIndicator');

            // 1. First 35% of scroll phase lifts the 3D top flap lid open
            if (percent <= 0.35) {
                let lidPercent = percent / 0.35; 
                let degrees = lidPercent * 180; 
                lid.style.transform = `rotateX(${degrees}deg)`;
                lid.style.zIndex = '4'; // Remains stacked forward above the card
                card.style.transform = `translateY(0px)`;
            } 
            // 2. Remaining 65% scroll sequence smoothly slides the card vertically UP out of the envelope
            else {
                lid.style.transform = `rotateX(180deg)`;
                lid.style.zIndex = '1'; // Drops behind the base frame pockets

                let cardPercent = (percent - 0.35) / 0.65;
                
                // Adapts sliding distance based on mobile vs desktop size constraints
                let slideDistance = window.innerWidth <= 500 ? -205 : -305;
                let currentSlide = cardPercent * slideDistance;
                
                card.style.transform = `translateY(${currentSlide}px)`;
            }

            // 3. Fade out the scrolling guide hint
            if (percent > 0.08) {
                hint.style.opacity = '0';
            } else {
                hint.style.opacity = '1';
            }

            // 4. Subtle macro adjustment shifting the whole envelope down slightly once fully deployed to center everything
            if (percent > 0.75) {
                let envelopePullPercent = (percent - 0.75) / 0.25;
                let envelopeShift = envelopePullPercent * 50;
                envelope.style.transform = `translateY(${envelopeShift}px)`;
            } else {
                envelope.style.transform = `translateY(0px)`;
            }
        });
    </script>
</body>
