            history.scrollRestoration = 'manual';
        }
        window.scrollTo(0, 0);

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Upload your custom background photo to GitHub and name it 'invitation-bg.jpg'.
               It will stretch beautifully to cover the screen.
            */
            background: #faf9f6 url('invitation-bg.jpg') no-repeat center center fixed; 
            background-size: cover;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            height: 220vh; /* Smooth scrolling runway to trigger the card opening */
            position: relative;
        }

        /* Fixed viewport scene hosting the envelope */
        .invite-viewport-scene {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1200px;
            z-index: 10;
        }

        /* Scroll Progress Hint Tracker */
        .scroll-hint {
            position: absolute;
            bottom: 40px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #d97d56; /* Rust accent */
            animation: bounceIndicator 2s infinite;
            text-align: center;
            pointer-events: none;
            transition: opacity 0.4s ease;
            font-weight: 400;
            text-shadow: 0 1px 3px rgba(255,255,255,0.8);
        }

        /* ----------------------------------------------------
           THE ENVELOPE (MATTE SLATE BLUE & ROUNDED & SOFT SHADOW)
           ---------------------------------------------------- */
        .envelope-wrapper {
            position: relative;
            width: 460px;
            height: 360px; /* Taller envelope to completely hold the card */
            background-color: #34495e; /* Elegant slate blue base */
            border-radius: 12px; /* Softened organic corners */
            margin-top: 60px;
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            
            /* Realistic soft, deep floating shadow under the whole envelope structure */
            filter: drop-shadow(0 25px 35px rgba(44, 62, 80, 0.25));
        }

        /* The Left, Right, and Bottom overlapping fold flap pockets.
           We use clip-path to ensure the V-shape spans the absolute full width of the envelope!
        */
        .envelope-wrapper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, #2c3e50 30%, #34495e 100%);
            z-index: 3; /* Keeps envelope front pockets stacked completely over the card */
            border-radius: 12px; /* Matches outer container radius */
            
            /* clip-path Polygon coordinates:
               Start at top-left (0 0), dip to the exact center (50% 50%), 
               rise to top-right (100% 0), then seal down to the bottom corners.
            */
            clip-path: polygon(0 0, 50% 50%, 100% 0, 100% 100%, 0 100%);
        }

        /* Shimmering gold foil line pressed directly ON the front face of the envelope */
        .envelope-gold-line {
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            bottom: 12px;
            pointer-events: none;
            z-index: 3; /* Sits directly on top of the front pockets */
            border-radius: 8px;
            padding: 1px; /* Emulates a thin 1px border line */
            background: linear-gradient(135deg, #bf953f 0%, #fcf6ba 25%, #b38728 50%, #fbf5b7 75%, #aa771c 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.85;
        }

        .envelope-flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;

            border-right: 230px solid transparent;
