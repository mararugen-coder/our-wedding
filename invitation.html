<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You are Invited — Celebrating the Giglios</title>
    <!-- Premium Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
    
    <link rel="icon" href="favicon-black.png" type="image/png" media="(prefers-color-scheme: light)">
    <link rel="icon" href="favicon-white.png" type="image/png" media="(prefers-color-scheme: dark)">

    <!-- Force the browser back to the top of the page on reload to prevent auto-scrolling issues -->
    <script>
        if (history.scrollRestoration) {
            history.scrollRestoration = 'manual';
        }
        window.scrollTo(0, 0);
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Upload your custom background photo to GitHub and name it 'invitation-bg.jpg'.
               It will stretch beautifully to cover the screen.
            */
            background: #faf9f6 url('invitation-bg.jpg') no-repeat center center fixed; 
            background-size: cover;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            height: 220vh; /* Smooth scrolling runway to trigger the card opening */
            position: relative;
        }

        /* Fixed viewport scene hosting the envelope */
        .invite-viewport-scene {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1200px;
            z-index: 10;
        }

        /* Scroll Progress Hint Tracker */
        .scroll-hint {
            position: absolute;
            bottom: 40px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #d97d56; /* Rust accent */
            animation: bounceIndicator 2s infinite;
            text-align: center;
            pointer-events: none;
            transition: opacity 0.4s ease;
            font-weight: 400;
            text-shadow: 0 1px 3px rgba(255,255,255,0.8);
        }

        /* ----------------------------------------------------
           THE ENVELOPE (MATTE SLATE BLUE & GOLD FOIL TRIMMED)
           ---------------------------------------------------- */
        .envelope-wrapper {
            position: relative;
            width: 460px;
            height: 360px; /* Taller envelope to completely hold the card */
            background-color: #34495e; /* Elegant slate blue base */
            border-radius: 12px; /* Softened organic corners */
            margin-top: 60px;
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            
            /* Gold foil border outlining the entire rectangular envelope container */
            border: 2px solid transparent;
            border-image: linear-gradient(135deg, #bf953f 0%, #fcf6ba 25%, #b38728 50%, #fbf5b7 75%, #aa771c 100%) 1;
            
            /* Realistic soft, deep floating shadow under the whole envelope structure */
            filter: drop-shadow(0 25px 35px rgba(44, 62, 80, 0.25));
        }

        /* The Left, Right, and Bottom overlapping fold flap pockets */
        .envelope-wrapper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Overlapping pockets styled in matching slate blue with fine soft drop shadows */
            background: linear-gradient(315deg, #2c3e50 50%, transparent 50%),
                        linear-gradient(45deg, #2c3e50 50%, transparent 50%),
                        linear-gradient(to top, #34495e 30%, #3d566e 100%);
            z-index: 3; /* Keeps envelope front pockets stacked completely over the card */
            border-radius: 10px; /* Matches slightly inside outer container radius */
            
            /* Elegant gold foil trim outlining the top edges of the lower overlapping fold pocket lines */
            border-bottom: 2px solid rgba(219, 183, 108, 0.35); 
        }

        /* The Top Open Flap (Slate Blue interior, Gold foil outer peak trim) */
        .envelope-flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 230px solid transparent;
            border-right: 230px solid transparent;
            border-top: 180px solid #34495e; /* Matches base Slate Blue */
            transform-origin: top center;
            z-index: 4; /* Keeps flap stacked above card until flipped open */
            transform: rotateX(0deg);
            will-change: transform;
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.15));
            border-radius: 8px 8px 0 0; /* Rounds the top folding point of the lid */
        }

        /* Gold foil edge line on the outer lip of the opening flap */
        .envelope-flap::after {
            content: '';
            position: absolute;
            top: -182px;
            left: -230px;
            width: 0;
            height: 0;
            border-left: 230px solid transparent;
            border-right: 230px solid transparent;
            border-top: 180px solid rgba(219, 183, 108, 0.6); /* Vibrant gold foil accent */
            z-index: -1;
            transform: scale(0.982) translateY(-2px);
            border-radius: 8px 8px 0 0;
        }

        /* ----------------------------------------------------
           THE WEDDING INVITATION CARD (GOLD FOIL INNER)
           ---------------------------------------------------- */
        .invitation-card {
            position: absolute;
            top: 25px; /* Safely tucked away inside envelope height */
            left: 20px;
            width: 420px;
            height: 310px; /* Kept strictly under 360px so it is invisible from bottom */
            background-color: #ffffff;
            z-index: 2; /* Sandwiched behind front pockets, in front of back panel */
            transform: translateY(0);
            will-change: transform;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            transition: transform 0.5s ease;
            border-radius: 4px; /* Slight softening of invitation card itself */
        }

        /* Realistic Multi-Tone Gold Foil Outer Border Trim */
        .gold-foil-border {
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            bottom: 12px;
            pointer-events: none;
            border: 2px solid transparent;
            border-image: linear-gradient(135deg, #bf953f 0%, #fcf6ba 25%, #b38728 50%, #fbf5b7 75%, #aa771c 100%) 1;
        }

        /* Inner Content Frame Container */
        .card-inner-frame {
            width: 100%;
            height: 100%;
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        /* Inner Card Typography */
        .card-caption {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #7d8c77; /* Sage */
            font-weight: 500;
        }

        .card-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.1rem;
            font-weight: 300;
            color: #34495e;
            line-height: 1.25;
            margin: 10px 0;
        }

        .card-date {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            font-style: italic;
            color: #d97d56; /* Rust Orange Accent */
            letter-spacing: 1px;
            font-weight: 400;
        }

        .card-location {
            font-size: 0.75rem;
            letter-spacing: 1.5px;
            color: #555555;
            text-transform: uppercase;
            line-height: 1.5;
            font-weight: 300;
        }

        /* Gold Foil Button link to Homepage */
        .card-cta-link {
            display: inline-block;
            padding: 10px 30px;
            background: linear-gradient(135deg, #bf953f 0%, #d4af37 50%, #aa771c 100%);
            color: #ffffff;
            text-decoration: none;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 500;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(170, 119, 28, 0.25);
            transition: all 0.3s ease;
            border: none;
        }

        .card-cta-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(170, 119, 28, 0.45);
        }

        /* Animation Helpers */
        @keyframes bounceIndicator {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-8px); }
            60% { transform: translateY(-4px); }
        }

        /* ----------------------------------------------------
           RESPONSIVE MOBILE GRAPHIC CONTAINER SCALING
           ---------------------------------------------------- */
        @media (max-width: 500px) {
            .envelope-wrapper {
                width: 320px;
                height: 250px;
                margin-top: 30px;
                border-radius: 8px; /* Slightly tighter curves on mobile */
            }
            .envelope-wrapper::before {
                border-radius: 8px;
            }
            .envelope-flap {
                border-left-width: 160px;
                border-right-width: 160px;
                border-top-width: 125px;
            }
            .envelope-flap::after {
                border-left-width: 160px;
                border-right-width: 160px;
                border-top-width: 125px;
                top: -127px;
                left: -160px;
            }
            .invitation-card {
                width: 290px;
                height: 215px;
                left: 15px;
                top: 20px;
            }
            .card-inner-frame { padding: 20px 15px; }
            .card-title { font-size: 1.5rem; }
            .card-date { font-size: 1.15rem; }
            .card-location { font-size: 0.65rem; }
            .card-cta-link { padding: 8px 20px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>

    <!-- Main 3D Simulation Viewport -->
    <div class="invite-viewport-scene">
        
        <!-- The Envelope Container -->
        <div class="envelope-wrapper" id="envelopeContainer">
            <!-- The Top Lid Flap -->
            <div class="envelope-flap" id="envelopeLid"></div>
            
            <!-- Invitation Card Insert (Tucked securely inside, shorter than envelope) -->
            <div class="invitation-card" id="inviteCard">
                <!-- Outer Metallic Foil Gold Border Frame -->
                <div class="gold-foil-border"></div>

                <div class="card-inner-frame">
                    <span class="card-caption">The Wedding Invitation</span>
                    
                    <div>
                        <h1 class="card-title">Celebrating<br>the Giglios</h1>
                        <p class="card-date">07 . 24 . 27</p>
                    </div>
                    
                    <p class="card-location">
                        Flagstaff, Arizona
                    </p>
                    
                    <a href="index.html" class="card-cta-link">Enter Website</a>
                </div>
            </div>
        </div>

        <!-- Scroll Assistance Guidance Callout -->
        <div class="scroll-hint" id="scrollIndicator">
            Scroll Down to Open
        </div>
    </div>

    <!-- ----------------------------------------------------
         THE PARALLAX MECHANICAL VELOCITY LOGIC DRIVER ENGINE
         ---------------------------------------------------- -->
    <script>
        window.addEventListener('scroll', () => {
            const scrollTop = window.scrollY;
            const maxScroll = window.innerHeight; // Animation spans the length of one complete viewport transition scroll height
            
            // Calculate progress percentage
            let percent = Math.min(scrollTop / maxScroll, 1);

            const lid = document.getElementById('envelopeLid');
            const card = document.getElementById('inviteCard');
            const envelope = document.getElementById('envelopeContainer');
            const hint = document.getElementById('scrollIndicator');

            // 1. First 35% of scroll phase lifts the 3D top flap lid open
            if (percent <= 0.35) {
                let lidPercent = percent / 0.35; 
                let degrees = lidPercent * 180; 
                lid.style.transform = `rotateX(${degrees}deg)`;
                lid.style.zIndex = '4'; // Remains stacked forward above the card
                card.style.transform = `translateY(0px)`;
            } 
            // 2. Remaining 65% scroll sequence smoothly slides the card vertically UP out of the envelope
            else {
                lid.style.transform = `rotateX(180deg)`;
                lid.style.zIndex = '1'; // Drops behind the base frame pockets

                let cardPercent = (percent - 0.35) / 0.65;
                
                // Adapts sliding distance based on mobile vs desktop size constraints
                let slideDistance = window.innerWidth <= 500 ? -205 : -305;
                let currentSlide = cardPercent * slideDistance;
                
                card.style.transform = `translateY(${currentSlide}px)`;
            }

            // 3. Fade out the scrolling guide hint
            if (percent > 0.08) {
                hint.style.opacity = '0';
            } else {
                hint.style.opacity = '1';
            }

            // 4. Subtle macro adjustment shifting the whole envelope down slightly once fully deployed to center everything
            if (percent > 0.75) {
                let envelopePullPercent = (percent - 0.75) / 0.25;
                let envelopeShift = envelopePullPercent * 50;
                envelope.style.transform = `translateY(${envelopeShift}px)`;
            } else {
                envelope.style.transform = `translateY(0px)`;
            }
        });
    </script>
</body>
</html>
