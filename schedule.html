<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <!-- Premium serif and modern sans-serif fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
    
    <!-- Adaptive Favicons for Light and Dark Modes -->
    <link rel="icon" href="favicon-black.png" type="image/png" media="(prefers-color-scheme: light)">
    <link rel="icon" href="favicon-white.png" type="image/png" media="(prefers-color-scheme: dark)">
</head>
<body>

    <!-- Premium Navigation Bar -->
    <nav class="navbar">
        <input type="checkbox" id="menu-toggle" class="menu-checkbox">
        
        <label for="menu-toggle" class="hamburger-btn">
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
        </label>

        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="story.html">Our Story</a>
            <a href="schedule.html">Schedule</a>
            <a href="travel.html">Travel & Stay</a>
            <a href="registry.html">Registry</a>
        </div>

        <div class="nav-logo">
            <a href="index.html">
                <img src="wedding-logo.png" alt="Daryl and Mara Wedding Logo" class="logo-image">
            </a>
        </div>

        <div class="nav-rsvp">
            <a href="https://mararugen.com/wedding-rsvp" target="_blank" class="rsvp-top-button">RSVP</a>
        </div>
    </nav>

    <!-- Sub-page Layout Container -->
    <main class="content-container" style="margin-top: 160px;">
        <section class="info-section">
            <h2>The Celebration</h2>
            <p class="subtitle">Join us for the celebration of our wedding day</p>
            <hr class="divider">
            
            <div class="schedule-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 40px;">
                <div class="event-card" style="background: #fff; padding: 30px; border: 1px solid #eee; text-align: center;">
                    <h3>Affirmation of Vows</h3>
                    <p class="time" style="font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; color: #dfb76c; margin: 10px 0;">5:00 PM</p>
                    <p class="venue">The Atrium | Rexburg, Idaho</p>
                </div>
                
                <div class="event-card" style="background: #fff; padding: 30px; border: 1px solid #eee; text-align: center;">
                    <h3>Reception</h3>
                    <p class="time" style="font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; color: #dfb76c; margin: 10px 0;">6:30 PM</p>
                    <p class="venue">The Atrium | Rexburg, Idaho</p>
                </div>
            </div>
        </section>
    </main>

</body>
